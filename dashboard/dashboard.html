<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kerjain — Dashboard Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
/* ── Dashboard layout ── */
.dash-layout { display: flex; min-height: 100vh; }

.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 20px 0;
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto;
}
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 0 18px 20px;
  font-weight: 800; font-size: 17px; letter-spacing: -0.02em;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.sidebar-logo .logo-mark { width: 30px; height: 30px; border-radius: 8px; background: var(--primary); display: grid; place-items: center; color: white; font-family: var(--font-mono); font-weight: 700; font-size: 13px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px; font-size: 14px; font-weight: 500;
  color: var(--text-muted); cursor: pointer;
  border-radius: 0; transition: all 0.15s;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { color: var(--text); background: var(--bg-subtle); }
.nav-item.active { color: var(--primary); background: var(--primary-soft); }
.nav-icon { font-size: 18px; }
.sidebar-footer { margin-top: auto; padding: 16px 18px 0; border-top: 1px solid var(--border); }
.logout-btn { width: 100%; padding: 9px; border-radius: var(--radius-md); border: 1.5px solid var(--border); background: none; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.15s; font-family: var(--font-sans); }
.logout-btn:hover { border-color: var(--danger); color: var(--danger); }

.dash-main { flex: 1; padding: 32px; overflow-y: auto; }
.dash-header { margin-bottom: 24px; }
.dash-title { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
.dash-sub   { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

/* ── Stats cards ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 28px; }
.stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; }
.stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-bottom: 6px; }
.stat-val   { font-size: 26px; font-weight: 800; font-family: var(--font-mono); letter-spacing: -0.02em; color: var(--text); }
.stat-sub   { font-size: 12px; color: var(--text-faint); margin-top: 4px; font-family: var(--font-mono); }

/* ── Order list ── */
.filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-chip { padding: 6px 14px; border-radius: 999px; border: 1.5px solid var(--border); background: none; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; font-family: var(--font-sans); transition: all 0.15s; }
.filter-chip:hover { border-color: var(--border-strong); color: var(--text); }
.filter-chip.active { background: var(--primary); border-color: var(--primary); color: white; }

.order-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 12px; overflow: hidden; transition: box-shadow 0.15s; }
.order-card:hover { box-shadow: var(--shadow-md); }
.order-head { display: flex; align-items: center; gap: 14px; padding: 14px 18px; cursor: pointer; }
.order-id { font-family: var(--font-mono); font-weight: 700; font-size: 13px; color: var(--primary); }
.order-name { font-weight: 600; font-size: 14px; }
.order-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.order-amount { font-family: var(--font-mono); font-weight: 700; font-size: 14px; margin-left: auto; }
.status-badge { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; flex-shrink: 0; }
.status-menunggu    { background: #FEF3C7; color: #92400E; }
.status-terverifikasi { background: #DBEAFE; color: #1E40AF; }
.status-dikerjakan  { background: #EDE9FE; color: #5B21B6; }
.status-selesai     { background: #DCFCE7; color: #15803D; }
.status-dibatalkan  { background: #FEE2E2; color: #991B1B; }

[data-theme="dark"] .status-menunggu    { background: #451A03; color: #FCD34D; }
[data-theme="dark"] .status-terverifikasi { background: #1E3A5F; color: #93C5FD; }
[data-theme="dark"] .status-dikerjakan  { background: #2E1065; color: #C4B5FD; }
[data-theme="dark"] .status-selesai     { background: #14532D; color: #86EFAC; }
[data-theme="dark"] .status-dibatalkan  { background: #450A0A; color: #FCA5A5; }

.order-body { padding: 0 18px 18px; border-top: 1px solid var(--border); }
.order-detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin: 14px 0; }
.od-item { font-size: 13px; }
.od-label { color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
.od-val { font-weight: 500; }
.proof-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--primary); font-weight: 500; text-decoration: none; padding: 6px 12px; border: 1.5px solid var(--primary); border-radius: var(--radius-md); }
.proof-link:hover { background: var(--primary-soft); }
.status-select { padding: 8px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-md); background: var(--bg); font-family: var(--font-sans); font-size: 13px; font-weight: 500; color: var(--text); cursor: pointer; }
.status-select:focus { outline: none; border-color: var(--primary); }

/* ── Pricing editor ── */
.pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
.pricing-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; }
.pricing-label { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
.pricing-desc  { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
.pricing-input-wrap { display: flex; align-items: center; gap: 8px; }
.pricing-prefix { font-size: 14px; font-weight: 500; color: var(--text-muted); flex-shrink: 0; }
.save-bar { position: sticky; bottom: 0; background: var(--bg-card); border-top: 1px solid var(--border); padding: 14px 0; display: flex; gap: 12px; align-items: center; margin-top: 24px; }
.save-hint { font-size: 13px; color: var(--text-muted); }

/* ── Payment methods editor ── */
.pm-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; margin-bottom: 14px; }
.pm-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.pm-logo { width: 40px; height: 40px; border-radius: 10px; display: grid; place-items: center; font-weight: 700; font-size: 12px; font-family: var(--font-mono); flex-shrink: 0; }
.pm-name { font-weight: 700; font-size: 15px; }
.pm-type { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.pm-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 600px) { .pm-fields { grid-template-columns: 1fr; } }

/* ── Login screen ── */
.login-shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
.login-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 40px; max-width: 380px; width: 100%; box-shadow: var(--shadow-lg); text-align: center; }
.login-logo-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
.login-title { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
.login-sub   { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
.login-error { color: var(--danger); font-size: 13px; margin-top: 8px; font-weight: 500; }

/* ── Loading / empty ── */
.loading-text { color: var(--text-muted); font-size: 14px; padding: 40px 0; text-align: center; }
.empty-state  { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-icon   { font-size: 40px; margin-bottom: 12px; }
.empty-title  { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }

@media (max-width: 720px) {
  .sidebar { display: none; }
  .dash-main { padding: 18px; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script type="text/babel" src="dashboard-app.jsx"></script>
</body>
</html>
